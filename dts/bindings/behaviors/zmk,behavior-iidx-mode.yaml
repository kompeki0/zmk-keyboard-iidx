description: Toggle between an IIDX layer and a standard USB keyboard layer

compatible: "zmk,behavior-iidx-mode"

include: zero_param.yaml

properties:
  iidx-layer:
    type: int
    required: false
    deprecated: true
    description: Deprecated single IIDX layer to activate in IIDX mode

  iidx-layers:
    type: array
    required: false
    description: Layers to activate together in IIDX mode

  keyboard-layer:
    type: int
    required: false
    deprecated: true
    description: Deprecated single standard keyboard layer to activate

  keyboard-layers:
    type: array
    required: false
    description: Layers to activate together in standard keyboard mode

  default-iidx-mode:
    type: boolean
    description: Start with IIDX HID mode enabled
